<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bharath | Portfolio</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    input, textarea {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      background: #6366f1;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Contact Me</h1>

<form id="contactForm">
  <input type="text" placeholder="Name" required><br>
  <input type="email" placeholder="Email" required><br>
  <textarea placeholder="Message" required></textarea><br>
  <button type="submit">Send</button>
</form>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const inputs = this.querySelectorAll("input, textarea");

  const data = {
    name: inputs[0].value,
    email: inputs[1].value,
    message: inputs[2].value
  };

  try {
    const res = await fetch("https://backend-qbzl.onrender.com/contact", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();
    console.log(text);

    if (res.ok) {
      alert("Message sent ✅");
      this.reset();
    } else {
      alert("Server error ❌");
    }

  } catch (err) {
    console.error(err);
    alert("Server is waking up... try again in 10 seconds ⚠️");
  }
});
</script>

</body>
</html>
